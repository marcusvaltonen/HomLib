name: Build HomLib

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:    
      - main

env:
  BUILD_CONFIGURATION: Release
  BUILD_DIR: _build
  INSTALL_DIR: _install

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your project
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev

      - name: Set PoseLib version
        id: poselib-version
        run: echo "POSELIB_VERSION=3.0.0" >> $GITHUB_ENV

      - name: Cache PoseLib build
        uses: actions/cache@v4
        id: cache-poselib
        with:
          path: ~/poselib-install
          key: ${{ runner.os }}-poselib-${{ env.POSELIB_VERSION }}

      - name: Build and install PoseLib
        if: steps.cache-poselib.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.POSELIB_VERSION }} https://github.com/PoseLib/PoseLib.git
          cd PoseLib
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=~/poselib-install \
                   -DPOSELIB_BUILD_TESTS=OFF \
                   -DPOSELIB_BUILD_EXAMPLES=OFF
          make -j$(nproc)
          make install

      - name: Configure project
        run: |
          cmake \
            -B ${{github.workspace}}/${{env.BUILD_DIR}} \
            -DCMAKE_PREFIX_PATH=~/poselib-install \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIGURATION}} \
            -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/${{env.INSTALL_DIR}}
      - name: Compile and Install
        run: |
          cmake \
            --build ${{github.workspace}}/${{env.BUILD_DIR}} \
            --config ${{env.BUILD_CONFIGURATION} \
            -j $(nproc)

      - name: Execute Tests
        run: ctest ${{github.workspace}}/${{env.INSTALL_DIR}} -j $(nproc) --output-on-failure
