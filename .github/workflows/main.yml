name: Build HomLib

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:    
      - main
    tags:
      - 'v*'

env:
  BUILD_CONFIGURATION: Release
  BUILD_DIR: _build

jobs:
  build:
    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Linux, os: ubuntu-latest, artifact: 'libMyLib-linux.zip' }
          - { name: macOS, os: macos-latest,   artifact: 'libMyLib-macos.zip' }

    steps:
      - name: Checkout your project
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev

      - name: Set PoseLib version
        id: poselib-version
        run: echo "POSELIB_VERSION=v2.0.5" >> $GITHUB_ENV

      - name: Cache PoseLib build
        uses: actions/cache@v4
        id: cache-poselib
        with:
          path: ~/poselib-install
          key: ${{ runner.os }}-poselib-${{ env.POSELIB_VERSION }}

      - name: Build and install PoseLib
        if: steps.cache-poselib.outputs.cache-hit != 'true'
        run: |
          git clone --branch ${{ env.POSELIB_VERSION }} https://github.com/PoseLib/PoseLib.git
          cd PoseLib
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=~/poselib-install \
                   -DPOSELIB_BUILD_TESTS=OFF \
                   -DPOSELIB_BUILD_EXAMPLES=OFF
          make -j$(nproc)
          make install

      - name: Configure project
        run: |
          cmake \
            -B ${{github.workspace}}/${{env.BUILD_DIR}} \
            -DCMAKE_PREFIX_PATH=~/poselib-install \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIGURATION}} \
      - name: Compile and Install
        run: |
          cmake \
            --build ${{github.workspace}}/${{env.BUILD_DIR}} \
            --config ${{env.BUILD_CONFIGURATION}} \
            -j $(nproc)

      - name: Execute Tests
        run: ctest --test-dir ${{github.workspace}}/${{env.BUILD_DIR}} -j $(nproc) --output-on-failure

      - name: Execute Examples
        run: ${{github.workspace}}/${{env.BUILD_DIR}}/example

      - name: Execute RANSAC Examples
        run: ${{github.workspace}}/${{env.BUILD_DIR}}/example_ransac
 
      - name: Package artifacts
        shell: bash
        run: |
          cd install
          zip -r ../${{ matrix.config.artifact }} .

      - name: Upload artifact (for later release)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact }}
          path: ${{ matrix.config.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Changes
            <!-- You can generate release notes automatically -->
            See the commits for details.
          draft: false
          prerelease: false
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
